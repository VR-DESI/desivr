<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DESI VR</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{

    width:100%;
    height:100%;
    overflow:hidden;

    background:#000;
    font-family:'Inter',sans-serif;

}

.hero{

    position:relative;

    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;

    overflow:hidden;

}

/* ---------- Fondo ---------- */

.hero::before{

    content:"";

    position:absolute;

    inset:-5%;

    background:url("PORTADA_2026.png") center center no-repeat;
    background-size:cover;

    animation:universe 40s ease-in-out infinite alternate;

    z-index:-3;

}

/* ---------- Oscurecer ---------- */

.hero::after{

    content:"";

    position:absolute;
    inset:0;

    background:
    radial-gradient(circle at center,
    rgba(0,80,180,.08),
    rgba(0,0,0,.72));

    z-index:-2;

}

/* ---------- Movimiento ---------- */

@keyframes universe{

    0%{

        transform:
        scale(1)
        translateX(0px)
        translateY(0px);

    }

    100%{

        transform:
        scale(1.10)
        translateX(-35px)
        translateY(-15px);

    }

}

/* ---------- Contenido ---------- */

.content{

    position:relative;

    z-index:5;

    max-width:850px;

    padding:40px;

}

h1{

    color:white;

    font-size:82px;

    font-weight:300;

    letter-spacing:16px;

    margin-bottom:25px;

}

h2{

    color:white;

    font-size:34px;

    font-weight:300;

    line-height:1.4;

}

p{

    margin-top:35px;

    color:#d5d5d5;

    font-size:20px;

    line-height:1.8;

}

/* ---------- Botón ---------- */

.button{

    display:inline-block;

    margin-top:55px;

    padding:18px 44px;

    color:white;

    text-decoration:none;

    border:1px solid rgba(255,255,255,.55);

    letter-spacing:2px;

    transition:.35s;

    backdrop-filter:blur(8px);

}

.button:hover{

    background:white;

    color:black;

}

/* ---------- Footer ---------- */

footer{

    position:absolute;

    bottom:30px;

    width:100%;

    color:#9a9a9a;

    text-align:center;

    font-size:14px;

    z-index:10;

}

</style>

</head>

<body>

<section class="hero">

<div class="content">

<h1>DESI VR</h1>

<h2>Experience the architecture of the Universe.</h2>

<p>

An immersive experience built from real astronomical observations
of the Dark Energy Spectroscopic Instrument.

</p>

<a href="#" class="button">

COMING SOON

</a>

</div>

<footer>

© 2026 Sergio Mata & Selma Llamas

</footer>

</section>

</body>

</html>
