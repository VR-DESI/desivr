<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DESI VR</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    font-family:'Inter',sans-serif;
    overflow:hidden;
}

.hero{

    position:relative;
    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;

}

/* Imagen de fondo */

.hero::before{

    content:"";

    position:absolute;
    inset:0;

    background:url("PORTADA_2026.png") center center no-repeat;
    background-size:cover;

    transform:scale(1.05);

}

/* Oscurece un poco para leer el texto */

.hero::after{

    content:"";

    position:absolute;
    inset:0;

    background:rgba(0,0,0,.45);

}

.content{

    position:relative;
    z-index:5;

    max-width:750px;
    padding:40px;

}

h1{

    color:white;
    font-size:72px;
    letter-spacing:12px;
    font-weight:600;

}

h2{

    color:white;
    font-size:34px;
    margin-top:20px;
    font-weight:300;

}

p{

    color:#d8d8d8;
    margin-top:30px;
    font-size:18px;
    line-height:1.8;

}

.button{

    margin-top:45px;

    display:inline-block;

    color:white;

    text-decoration:none;

    border:1px solid rgba(255,255,255,.7);

    padding:16px 42px;

    transition:.35s;

}

.button:hover{

    background:white;
    color:black;

}

footer{

    position:absolute;

    bottom:25px;

    width:100%;

    text-align:center;

    color:#999;

    z-index:10;

}

</style>

</head>

<body>

<section class="hero">

<div class="content">

<h1>DESI VR</h1>

<h2>Experience the architecture of the Universe.</h2>

<p>
An immersive experience built from real astronomical observations of the
Dark Energy Spectroscopic Instrument.
</p>

<a class="button" href="#">
Coming Soon
</a>

</div>

<footer>

© 2026 Sergio Mata & Selma Llamas

</footer>

</section>

</body>

</html>
